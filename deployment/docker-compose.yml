services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: tech_news_db
    restart: always
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: tech_news_n8n
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - ALI_API_KEY=${ALI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY}

      - GENERIC_TIMEZONE=${TIMEZONE}
      - TZ=${TIMEZONE}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false

      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=localhost,127.0.0.1,postgres,metabase

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    container_name: tech_news_bi
    restart: always
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
      - JAVA_OPTS=-Xmx2048m -Xms1024m
    volumes:
      # 此处为挂载宿主机上已有的 Metabase DB 文件
      - ./:/metabase-data
      # 注意：若无 Metabase DB 文件应采用下面的形式
      # - metabase_data:/metabase-data 
    networks:
      - app_network

  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: tech_news_bot
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: tech_news_api
    restart: always
    command: [ "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000" ]
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  n8n_data:
  metabase_data:


networks:
  app_network:
    driver: bridge
