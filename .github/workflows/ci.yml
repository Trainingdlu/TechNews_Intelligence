name: Agent CI

on:
  pull_request:
    paths:
      - "agents/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - ".github/workflows/**"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "agents/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          pytest agents/tests -v
