name: Deploy to Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 63210
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}
            git checkout main
            git pull --ff-only origin main

            if [ -f deployment/docker-compose.yml ]; then
              COMPOSE_FILE="deployment/docker-compose.yml"
            elif [ -f docker-compose.yml ]; then
              COMPOSE_FILE="docker-compose.yml"
            else
              echo "docker-compose file not found."
              exit 1
            fi

            OLD_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' pgvector/pgvector:pg15 2>/dev/null || echo "none")

            docker compose -f "$COMPOSE_FILE" pull postgres n8n metabase
            docker compose -f "$COMPOSE_FILE" build --pull bot api
            docker compose -f "$COMPOSE_FILE" up -d --remove-orphans
            docker image prune -f

            NEW_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' pgvector/pgvector:pg15 2>/dev/null || echo "none")

            if [ "$OLD_DIGEST" != "$NEW_DIGEST" ]; then
              echo "PostgreSQL image updated, running REINDEX..."
              docker compose -f "$COMPOSE_FILE" exec -T postgres sh -lc 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "REINDEX INDEX unique_url;"'
            else
              echo "PostgreSQL image unchanged, skipping REINDEX."
            fi

            echo "Checking container health..."
            for svc in postgres n8n bot api; do
              if ! docker compose -f "$COMPOSE_FILE" ps "$svc" | grep -q "Up"; then
                echo "Service $svc is not healthy/up"
                docker compose -f "$COMPOSE_FILE" ps "$svc"
                exit 1
              fi
            done
            echo "All core services are up."
