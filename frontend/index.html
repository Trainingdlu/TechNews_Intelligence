<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Agent | Trainingcqy</title>
    <meta name="description" content="TechNews Intelligence 科技新闻智能分析助手，基于 Gemini 大模型深度解读科技动态">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260502b">
</head>

<body class="agent-page">

    <!-- ===== Top Navigation ===== -->
    <nav class="topbar">
        <a class="logo-area" href="https://trainingcqy.com/">
            Trainingcqy
        </a>
        <a class="nav-item" href="https://trainingcqy.com/">
            首页
        </a>
        <a class="nav-item" href="https://trainingcqy.com/projects.html">
            项目
        </a>
        <a class="nav-item" href="https://trainingcqy.com/gallery.html">
            摄影
        </a>
    </nav>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换深浅主题" title="切换深浅主题">
        <span class="material-symbols-outlined">dark_mode</span>
    </button>

    <!-- ===== Bottom Navigation (Mobile) ===== -->
    <nav class="bottom-nav">
        <a class="bottom-nav-item" href="https://trainingcqy.com/">
            <div class="icon-container">
                <span class="material-symbols-outlined">home</span>
            </div>首页
        </a>
        <a class="bottom-nav-item" href="https://trainingcqy.com/projects.html">
            <div class="icon-container">
                <span class="material-symbols-outlined">folder_open</span>
            </div>项目
        </a>
        <a class="bottom-nav-item" href="https://trainingcqy.com/gallery.html">
            <div class="icon-container">
                <span class="material-symbols-outlined">photo_library</span>
            </div>摄影
        </a>
    </nav>

    <!-- ===== Auth View ===== -->
    <main id="auth-view" class="view active">
        <div class="auth-card">
            <h1 class="auth-title">TechNews Intelligence</h1>
            <p class="auth-subtitle">科技新闻智能分析助手</p>

            <!-- Email Form -->
            <form id="email-form" class="auth-form">
                <div class="input-group">
                    <input type="email" id="email-input" placeholder="输入邮箱获取访问权限" required autocomplete="email">
                </div>
                <button type="submit" id="email-btn" class="secondary-btn">
                    <span class="btn-label">获取访问权限</span>
                </button>
            </form>

            <p id="email-status" class="status-msg"></p>

            <div class="auth-divider">
                <span>已有 Token？</span>
            </div>

            <!-- Token Form -->
            <form id="token-form" class="auth-form">
                <div class="input-group">
                    <input type="text" id="token-input" placeholder="粘贴 Token" required>
                </div>
                <button type="submit" class="secondary-btn">
                    <span class="btn-label">开始对话</span>
                </button>
            </form>
            <div class="auth-link-row">
                <a class="auth-link" href="subscribe.html">
                    订阅 Tech Brief
                </a>
            </div>
        </div>
    </main>

    <!-- ===== Chat View ===== -->
    <main id="chat-view" class="view">
        <div class="chat-container chat-empty">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="chat-header-left">
                    <span id="quota-display" class="quota-badge">剩余 --/-- 次</span>
                </div>
                <div class="chat-header-actions">
                    <button id="clear-btn" class="icon-btn" title="清空对话">
                        <span class="material-symbols-outlined">delete_sweep</span>
                    </button>
                    <button id="logout-btn" class="icon-btn" title="退出登录">
                        <span class="material-symbols-outlined">logout</span>
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages" class="messages">
                <div class="welcome-msg">
                    <h1 class="welcome-title">TechNews Intelligence</h1>
                </div>
            </div>

            <!-- Quota Exhausted Overlay -->
            <div id="quota-overlay" class="quota-overlay">
                <div class="quota-overlay-content">
                    <span class="material-symbols-outlined quota-overlay-icon">lock</span>
                    <p>额度已用完</p>
                    <p class="quota-overlay-hint">审批请求已发送至管理员，通过后将邮件通知您。</p>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="input-bar">
                <div class="input-bar-inner">
                    <textarea id="chat-input" placeholder="你想知道什么？" rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <span class="material-symbols-outlined">arrow_upward</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="theme.js?v=20260501a"></script>
    <script src="app.js?v=20260502a"></script>
</body>

</html>
