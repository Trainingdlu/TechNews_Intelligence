<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI','Microsoft YaHei','PingFang SC','Hiragino Sans GB','Noto Sans CJK SC',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c9d1d9"/>
    </marker>
    <marker id="arrowLight" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="#0d1117"/>

  <!-- ===== ZONE TITLES ===== -->
  <g font-size="15" font-weight="700" fill="#f0f6fc">
    <text x="44"  y="54">数据生产</text>
    <text x="368" y="54">智能体核心</text>
    <text x="692" y="240">可信输出</text>
    <text x="44"  y="550">可观测与评测</text>
  </g>

  <!-- ===== EDGES: main flow (solid) ===== -->
  <g stroke="#c9d1d9" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <!-- DATA column -->
    <line x1="174" y1="129" x2="174" y2="164"/>
    <line x1="174" y1="210" x2="174" y2="257"/>
    <line x1="174" y1="319" x2="174" y2="381"/>
    <!-- CORE column -->
    <line x1="498" y1="129" x2="498" y2="164"/>
    <line x1="498" y1="210" x2="498" y2="244"/>
    <line x1="498" y1="290" x2="498" y2="324"/>
    <line x1="498" y1="370" x2="498" y2="404"/>
    <!-- OUT column -->
    <line x1="822" y1="310" x2="822" y2="344"/>
    <line x1="822" y1="390" x2="822" y2="424"/>
    <!-- CORE -> OUT handoff -->
    <path d="M598,268 C660,268 670,288 720,288"/>
  </g>

  <!-- ===== EDGES: taps (dashed) ===== -->
  <g stroke="#8b949e" stroke-width="1.6" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowLight)">
    <!-- store -> tools (读取) -->
    <path d="M274,408 C330,408 345,428 396,428"/>
    <!-- runtime -> trace (写) -->
    <path d="M598,348 L622,348 L622,560 L555,560 L555,572"/>
    <!-- store -> evals (读) -->
    <path d="M160,435 C152,490 150,520 150,576"/>
    <!-- store -> metabase (读) -->
    <path d="M214,435 C260,490 320,520 358,576"/>
  </g>

  <!-- ===== EDGE LABELS ===== -->
  <g font-size="12" fill="#c9d1d9" text-anchor="middle">
    <rect x="318" y="392" width="40" height="18" rx="4" fill="#161b22"/>
    <text x="338" y="405">读取</text>
    <rect x="612" y="447" width="28" height="18" rx="4" fill="#161b22"/>
    <text x="626" y="460">写</text>
    <rect x="128" y="497" width="28" height="18" rx="4" fill="#161b22"/>
    <text x="142" y="510">读</text>
    <rect x="286" y="497" width="28" height="18" rx="4" fill="#161b22"/>
    <text x="300" y="510">读</text>
  </g>

  <!-- ===== NODES ===== -->
  <g font-size="14" fill="#f0f6fc" text-anchor="middle">
    <g stroke="#c9d1d9" stroke-width="1.5" fill="#161b22">
      <!-- DATA -->
      <rect x="114" y="88"  width="120" height="40" rx="20"/>
      <rect x="74"  y="166" width="200" height="44" rx="8"/>
      <rect x="74"  y="259" width="200" height="60" rx="8"/>
      <path d="M74,390 L74,426 A100,9 0 0 0 274,426 L274,390"/>
      <ellipse cx="174" cy="390" rx="100" ry="9"/>
      <!-- CORE -->
      <rect x="438" y="88"  width="120" height="40" rx="20"/>
      <rect x="398" y="166" width="200" height="44" rx="8"/>
      <rect x="398" y="246" width="200" height="44" rx="8"/>
      <rect x="398" y="326" width="200" height="44" rx="8"/>
      <rect x="398" y="406" width="200" height="44" rx="8"/>
      <!-- OUT -->
      <rect x="722" y="266" width="200" height="44" rx="8"/>
      <rect x="722" y="346" width="200" height="44" rx="8"/>
      <polygon points="738,426 922,426 906,470 722,470"/>
      <!-- OBS -->
      <rect x="60"  y="578" width="180" height="44" rx="8"/>
      <rect x="280" y="578" width="160" height="44" rx="8"/>
      <path d="M470,582 L470,618 A85,8 0 0 0 640,618 L640,582"/>
      <ellipse cx="555" cy="582" rx="85" ry="8"/>
    </g>

    <!-- DATA labels -->
    <text x="174" y="113">新闻源</text>
    <text x="174" y="193">n8n 采集编排</text>
    <text x="174" y="283">Jina 正文 · Embedding 向量</text>
    <text x="174" y="303">摘要 / 分类 / 情绪</text>
    <text x="174" y="414" font-size="13.5">PostgreSQL + pgvector</text>
    <!-- CORE labels -->
    <text x="498" y="113">用户问题</text>
    <text x="498" y="193">API · Bot · CLI</text>
    <text x="498" y="273">LangGraph Agent</text>
    <text x="498" y="353">ToolRuntime</text>
    <text x="498" y="433">检索 / 分析工具</text>
    <!-- OUT labels -->
    <text x="822" y="293">证据归一</text>
    <text x="822" y="373">输出守卫</text>
    <text x="822" y="453">带来源回答</text>
    <!-- OBS labels -->
    <text x="150" y="605">离线评测 G1–G6</text>
    <text x="360" y="605">Metabase BI</text>
    <text x="555" y="606" font-size="13.5">Trace · Model I/O</text>
  </g>
</svg>
