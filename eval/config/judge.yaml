judge_model: gemini-2.5-pro
judge_provider: vertex
judge_backend: llm

temperature: 0.0
batch_size: 4
max_retries: 2
retry_backoff_sec: 1.5
request_timeout_sec: 120
skip_failed_cases: true

max_answer_chars: 5000
max_context_chars: 4000
max_constraints_chars: 3000

thresholds:
  excellent: 4.5
  good: 3.5
  adequate: 2.5
  poor: 1.5
